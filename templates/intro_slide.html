<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    background: #0d0d0d;
    font-family: 'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
  }
  .accent-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 6px;
    background: linear-gradient(90deg, #00c16e 0%, #00c16e 40%, transparent 100%);
  }
  .content {
    padding: 80px 70px;
    text-align: center;
    max-width: 100%;
  }
  .pillar-tag {
    display: inline-block;
    font-size: 28px;
    font-weight: 600;
    color: #00c16e;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-bottom: 50px;
    padding: 12px 28px;
    border: 2px solid rgba(0, 193, 110, 0.3);
    border-radius: 6px;
  }
  .headline {
    font-size: 82px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.1;
    margin-bottom: 40px;
    letter-spacing: -1px;
  }
  .subheadline {
    font-size: 36px;
    color: #aaaaaa;
    line-height: 1.5;
    font-weight: 400;
    max-width: 900px;
    margin: 0 auto;
  }
  .watermark {
    position: absolute;
    bottom: 50px;
    left: 60px;
    font-size: 26px;
    color: #00c16e;
    font-weight: 600;
    opacity: 0.8;
  }
  .slide-number {
    position: absolute;
    bottom: 50px;
    right: 60px;
    font-size: 24px;
    color: #555555;
    font-weight: 500;
  }
  .glow {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0, 193, 110, 0.08) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="glow"></div>
  <div class="content">
    <div class="pillar-tag">{{PILLAR_TAG}}</div>
    <h1 class="headline">{{HEADLINE}}</h1>
    <p class="subheadline">{{SUBHEADLINE}}</p>
  </div>
  <div class="watermark">@predictireland</div>
  <div class="slide-number">{{SLIDE_NUM}} / {{TOTAL_SLIDES}}</div>
</body>
</html>
