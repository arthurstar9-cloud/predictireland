<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    background: #0d0d0d;
    font-family: 'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
  }
  .accent-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 6px;
    background: linear-gradient(90deg, #00c16e 0%, #00c16e 40%, transparent 100%);
  }
  .card {
    width: 920px;
    background: #151515;
    border-radius: 24px;
    border: 1px solid #2a2a2a;
    padding: 70px 60px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: {{DIRECTION_COLOR}};
  }
  .market-title {
    font-size: 40px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.3;
    margin-bottom: 50px;
  }
  .probability-section {
    text-align: center;
    margin: 40px 0 50px;
  }
  .prob-label {
    font-size: 26px;
    color: #888888;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 15px;
  }
  .probability {
    font-size: 160px;
    font-weight: 800;
    color: {{DIRECTION_COLOR}};
    line-height: 1;
    letter-spacing: -4px;
  }
  .probability .unit {
    font-size: 80px;
    font-weight: 600;
    opacity: 0.7;
  }
  .outcome-label {
    font-size: 32px;
    color: #cccccc;
    margin-top: 10px;
    font-weight: 500;
  }
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 60px;
    margin: 40px 0;
    padding: 30px 0;
    border-top: 1px solid #2a2a2a;
    border-bottom: 1px solid #2a2a2a;
  }
  .stat {
    text-align: center;
  }
  .stat-value {
    font-size: 32px;
    font-weight: 700;
    color: #ffffff;
  }
  .stat-label {
    font-size: 22px;
    color: #666666;
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .commentary {
    font-size: 30px;
    color: #bbbbbb;
    line-height: 1.5;
    margin-top: 40px;
    font-style: italic;
    text-align: center;
    padding: 0 20px;
  }
  .watermark {
    position: absolute;
    bottom: 50px;
    left: 60px;
    font-size: 26px;
    color: #00c16e;
    font-weight: 600;
    opacity: 0.8;
  }
  .slide-number {
    position: absolute;
    bottom: 50px;
    right: 60px;
    font-size: 24px;
    color: #555555;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="card">
    <div class="market-title">{{MARKET_TITLE}}</div>
    <div class="probability-section">
      <div class="prob-label">Current Probability</div>
      <div class="probability">{{PROBABILITY}}<span class="unit">%</span></div>
      <div class="outcome-label">{{OUTCOME_LABEL}}</div>
    </div>
    <div class="stats-row">
      <div class="stat">
        <div class="stat-value">{{VOLUME_24H}}</div>
        <div class="stat-label">24h Volume</div>
      </div>
      <div class="stat">
        <div class="stat-value">{{TOTAL_VOLUME}}</div>
        <div class="stat-label">Total Volume</div>
      </div>
      <div class="stat">
        <div class="stat-value">{{LIQUIDITY}}</div>
        <div class="stat-label">Liquidity</div>
      </div>
    </div>
    <div class="commentary">"{{COMMENTARY}}"</div>
  </div>
  <div class="watermark">@predictireland</div>
  <div class="slide-number">{{SLIDE_NUM}} / {{TOTAL_SLIDES}}</div>
</body>
</html>
